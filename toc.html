<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目录 | 字里</title>

  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script src="/_vercel/insights/script.js"></script>

  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script src="/_vercel/speed-insights/script.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       ✨ 「字里」全站诗笺美学 ✨
    ========================================================= */
    :root {
      --bg: #fdfbf7;             
      --card: #fdfbf7;           
      --text-main: #2c2621;      
      --text-muted: #8b7e74;     
      --accent: #a64036;         
      --border: #e6dfd7;         
      --border-hover: #2c2621;   
      --sidebar-w: 280px;
    }
    
    body.dark { 
      --bg: #161311;             
      --card: #161311; 
      --text-main: #d4c4b7;      
      --text-muted: #8b7e74; 
      --accent: #b34d4d;         
      --border: #3d342b;
      --border-hover: #d4c4b7;
    }

    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      font-family: 'Noto Serif SC', serif; 
      background: var(--bg); 
      color: var(--text-main); 
      transition: background 0.5s ease, color 0.5s ease; 
      line-height: 1.8; letter-spacing: 0.5px;
    }
    a { text-decoration: none; color: inherit; }

    /* --- 导航栏 (Header) --- */
    header {
      position: sticky; top: 0; z-index: 1200; display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: rgba(253, 251, 247, 0.85); 
      border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); height: 70px;
      transition: background 0.5s ease, border-color 0.5s ease;
    }
    body.dark header { background: rgba(22, 19, 17, 0.85); }

    .icon-btn { 
      background: transparent; border: none; padding: 8px; cursor: pointer; 
      color: var(--text-muted); display: flex; align-items: center; 
      transition: color 0.3s; outline: none; 
    }
    .icon-btn:hover { color: var(--text-main); }
    .icon-btn svg { width: 22px; height: 22px; stroke-width: 1.5; stroke: currentColor; }

    .logo-title { 
      position: absolute; left: 50%; transform: translateX(-50%); 
      display: flex; align-items: center; gap: 10px; color: var(--text-main); 
    }
    .logo-title img { height: 32px; width: 32px; border-radius: 4px; border: 1px solid var(--border); filter: grayscale(20%);}
    .logo-title h1 { margin: 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 4px; }

    /* --- 搜索弹窗 (诗笺风) --- */
    .search-panel { 
      position: absolute; top: 75px; left: 16px; right: 16px; max-width: 500px; margin: 0 auto;
      background: var(--card); border: 1px solid var(--text-main); 
      padding: 10px; display: none; z-index: 1100;
      animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    body.dark .search-panel { box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    .search-box-inner { display: flex; align-items: center; border-bottom: 1px dashed var(--text-muted); padding: 5px 10px; }
    .search-box-inner svg { width: 18px; height: 18px; color: var(--text-muted); margin-right: 12px; flex-shrink: 0; }
    .search-box-inner input { flex: 1; padding: 10px 0; border: none; background: transparent; outline: none; font-family: inherit; color: var(--text-main); font-size: 1rem; letter-spacing: 1px;}
    .search-box-inner input::placeholder { color: var(--text-muted); font-weight: 300;}

    /* 搜索结果极简线框化 */
    .search-results { max-height: 350px; overflow-y: auto; margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
    .search-results:empty { display: none; margin-top: 0; }
    .search-item { display: flex; align-items: center; gap: 15px; padding: 10px; border: 1px solid transparent; border-bottom: 1px dashed var(--border); transition: all 0.3s; }
    .search-item:hover { border-color: var(--border-hover); transform: translateX(3px); }
    .search-item img { width: 45px; height: 45px; border: 1px solid var(--border); object-fit: cover; flex-shrink: 0; filter: sepia(10%) contrast(95%); }
    .search-item-title { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }

    /* --- 侧边栏 --- */
    .sidebar { 
      position: fixed; left: 0; top: 0; height: 100%; width: var(--sidebar-w); 
      background: var(--bg); border-right: 1px solid var(--border); 
      z-index: 1250; padding: 30px 20px; overflow-y: auto; 
      transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
    }
    .sidebar.active { transform: translateX(0); }
    
    .nav-item {
      display: flex; align-items: center; gap: 15px; width: 100%; padding: 12px 10px; margin-bottom: 5px;
      background: transparent; color: var(--text-muted); border: none; cursor: pointer; 
      font-size: 1.05rem; font-family: inherit; letter-spacing: 2px;
      transition: all 0.3s; position: relative;
    }
    .nav-item::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 2px; height: 0; background: var(--accent); transition: height 0.3s;
    }
    .nav-item:hover, .nav-item.active { color: var(--text-main); font-weight: 600; }
    .nav-item:hover::before, .nav-item.active::before { height: 60%; }
    
    .nav-item svg { width: 18px; height: 18px; stroke-width: 1.5; fill: none; stroke: currentColor; }
    .chevron { margin-left: auto; width: 14px !important; transition: transform 0.3s; }
    .nav-item.open .chevron { transform: rotate(180deg); }

    .tag-box { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; display: flex; flex-wrap: wrap; gap: 10px; padding-left: 35px; }
    .tag-box.show { max-height: 200px; margin: 5px 0 20px; }
    .tag-pill { 
      padding: 4px 12px; background: transparent; border: 1px solid var(--border); 
      color: var(--text-muted); cursor: pointer; transition: all 0.3s; 
      font-size: 0.85rem; letter-spacing: 1px;
    }
    .tag-pill:hover { border-color: var(--accent); color: var(--accent); }

    .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: none; z-index: 1240; backdrop-filter: blur(2px); transition: opacity 0.3s; opacity: 0;}
    .backdrop.show { display: block; opacity: 1;}

    /* =========================================
       ✨ 目录专属文人排版 ✨
       ========================================= */
    main { max-width: 700px; margin: 50px auto 80px; padding: 0 20px; }
    
    /* 顶部大标题 */
    .anthology-header { text-align: center; margin-bottom: 70px; }
    .anthology-title { font-size: 2.2rem; color: var(--text-main); letter-spacing: 6px; margin: 0 0 10px 0; font-weight: 600; }
    .anthology-subtitle { font-size: 1rem; color: var(--text-muted); letter-spacing: 3px; }

    /* 分卷样式（卷一：见我，等） */
    .volume-block { margin-bottom: 70px; }
    .volume-header { text-align: center; margin-bottom: 40px; position: relative; }
    /* 用伪元素做两侧的纤细墨线 */
    .volume-header::before, .volume-header::after {
      content: ''; position: absolute; top: 50%; width: 25%; height: 1px; background: var(--border);
    }
    .volume-header::before { left: 0; }
    .volume-header::after { right: 0; }
    
    .volume-name { display: inline-block; font-size: 1.4rem; color: var(--text-main); font-weight: 600; margin: 0; letter-spacing: 4px; padding: 0 25px; background: var(--bg); position: relative; z-index: 2;}
    .volume-desc { font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; letter-spacing: 2px; }

    /* 古籍虚线列表 */
    .poem-list { list-style: none; padding: 0; margin: 0; }
    .poem-item { margin-bottom: 22px; }
    .poem-link { 
      display: flex; align-items: baseline; transition: transform 0.3s ease; 
    }
    .poem-link:hover { transform: translateX(5px); }
    
    .p-title { font-size: 1.1rem; font-weight: 600; color: var(--text-main); transition: 0.3s; white-space: nowrap; letter-spacing: 1px;}
    .poem-link:hover .p-title { color: var(--accent); }
    
    /* 极细的虚线连接符 */
    .p-dots { flex: 1; border-bottom: 1px dotted var(--text-muted); margin: 0 15px; position: relative; top: -6px; opacity: 0.4; transition: opacity 0.3s;}
    .poem-link:hover .p-dots { opacity: 0.8; border-bottom-color: var(--border-hover); }
    
    .p-date { font-size: 0.9rem; color: var(--text-muted); white-space: nowrap; letter-spacing: 1px;}

    footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 2px; opacity: 0.7;}
  </style>
</head>
<body>

  <header>
    <button class="icon-btn" id="menuBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <a href="index.html" class="logo-title">
        <img src="assets/img/logo.png" alt="logo" onerror="this.src='images/logo.png'">
        <h1>字里</h1>
    </a>
    <button class="icon-btn" id="searchBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    
    <div class="search-panel" id="searchPanel">
        <div class="search-box-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input id="searchInput" type="text" placeholder="输入篇名或词句..." autocomplete="off" />
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>首卷
    </a>
    <a href="toc.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M7 8h10M7 12h10M7 16h6"></path></svg>目录
    </a>
    <a href="about.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>关于
    </a>
    
    <div style="height:1px; background:var(--border); margin:15px 0; opacity:0.6;"></div>

    <button class="nav-item" id="tagToggleBtn">
        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path></svg>
        分类
        <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
    <div class="tag-box" id="tagBox">
        <a href="index.html?q=见人" class="tag-pill">见人</a>
        <a href="index.html?q=见物" class="tag-pill">见物</a>
        <a href="index.html?q=见我" class="tag-pill">见我</a>
    </div>

    <div style="height:1px; background:var(--border); margin:15px 0; opacity:0.6;"></div>

    <button id="randomBtn" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline></svg>偶遇一首</button>
    <button id="darkBtn" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>夜读模式</button>
  </aside>

  <div class="backdrop" id="backdrop"></div>

  <main>
    <div class="anthology-header">
      <h1 class="anthology-title">全卷</h1>
      <div class="anthology-subtitle" id="tocCount">梳理中...</div>
    </div>
    
    <div id="anthologyContainer"></div>
  </main>

  <footer>© <span id="year"></span> 字里 · 迟行</footer>

  <script>
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('backdrop');
    const tagBox = document.getElementById('tagBox');
    const tagToggleBtn = document.getElementById('tagToggleBtn');
    
    document.getElementById('menuBtn').onclick = () => { sidebar.classList.add('active'); backdrop.classList.add('show'); };
    backdrop.onclick = () => { sidebar.classList.remove('active'); backdrop.classList.remove('show'); document.getElementById('searchPanel').style.display='none'; };
    
    let allPoemsCache = null; 

    document.getElementById('searchBtn').onclick = async () => { 
        const sp = document.getElementById('searchPanel'); 
        sp.style.display = sp.style.display === 'block' ? 'none' : 'block'; 
        if(sp.style.display === 'block') {
            document.getElementById('searchInput').focus();
            if(!allPoemsCache) {
                try {
                    const res = await fetch('poems/poems.json?v=' + Date.now());
                    allPoemsCache = await res.json();
                } catch(e) { console.error("加载搜索数据失败"); }
            }
        }
    };

    document.getElementById('searchInput').addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        const resultsDiv = document.getElementById('searchResults');
        
        if (!q || !allPoemsCache) {
            resultsDiv.innerHTML = '';
            return;
        }
        
        const matched = allPoemsCache.filter(p => p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q));
        
        if (matched.length === 0) {
            resultsDiv.innerHTML = '<div style="text-align:center; padding:15px; color:var(--text-muted); font-size:0.95rem; letter-spacing:1px;">未寻得此卷</div>';
            return;
        }
        
        resultsDiv.innerHTML = matched.map(p => `
            <a href="poems/${p.file}" class="search-item">
                <img src="${p.img}" loading="lazy" onerror="this.src='assets/img/logo.png'">
                <span class="search-item-title">${p.title}</span>
            </a>
        `).join('');
    });

    tagToggleBtn.onclick = () => { tagToggleBtn.classList.toggle('open'); tagBox.classList.toggle('show'); };

    document.getElementById('darkBtn').onclick = () => { document.body.classList.toggle('dark'); localStorage.setItem('site-dark', document.body.classList.contains('dark') ? '1' : '0'); };

    document.getElementById('randomBtn').onclick = () => { 
        if(allPoemsCache && allPoemsCache.length) window.location.href = 'poems/' + allPoemsCache[Math.floor(Math.random()*allPoemsCache.length)].file; 
    };

    // ✨ 按卷收录逻辑 ✨
    async function initAnthology() {
        if(localStorage.getItem('site-dark')==='1') document.body.classList.add('dark');
        document.getElementById('year').innerText = new Date().getFullYear();
        
        try {
            const res = await fetch('poems/poems.json?v=' + Date.now());
            allPoemsCache = await res.json();
            
            document.getElementById('tocCount').innerText = `共收录 ${allPoemsCache.length} 篇`;
            
            const volumes = [
                { id: "见我", title: "卷一 · 见我", desc: "灵魂的独白", items: [] },
                { id: "见人", title: "卷二 · 见人", desc: "世间的缩影", items: [] },
                { id: "见物", title: "卷三 · 见物", desc: "物品的隐喻", items: [] },
                { id: "拾遗", title: "卷四 · 拾遗", desc: "散落的星斑", items: [] } 
            ];

            allPoemsCache.forEach(p => {
                let placed = false;
                for(let i=0; i<3; i++) {
                    if(p.tags && p.tags.includes(volumes[i].id)) {
                        volumes[i].items.push(p);
                        placed = true;
                        break; 
                    }
                }
                if(!placed) volumes[3].items.push(p);
            });

            let htmlStr = '';
            volumes.forEach(vol => {
                if(vol.items.length === 0) return; 

                htmlStr += `
                <div class="volume-block">
                    <div class="volume-header">
                        <h2 class="volume-name">${vol.title}</h2>
                        <div class="volume-desc">${vol.desc}</div>
                    </div>
                    <ul class="poem-list">
                `;
                
                vol.items.forEach(p => {
                    const dateStr = p.date ? p.date : '';
                    htmlStr += `
                        <li class="poem-item">
                            <a href="poems/${p.file}" class="poem-link">
                                <span class="p-title">${p.title}</span>
                                <span class="p-dots"></span>
                                <span class="p-date">${dateStr}</span>
                            </a>
                        </li>
                    `;
                });

                htmlStr += `</ul></div>`;
            });
            
            document.getElementById('anthologyContainer').innerHTML = htmlStr;
            
        } catch(e) { 
            document.getElementById('anthologyContainer').innerHTML = '<p style="text-align:center; color:var(--accent);">诗卷暂不可读，请检查归档。</p>';
        }
    }
    
    initAnthology();
  </script>
</body>
</html>
