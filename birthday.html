<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字里 · 生日快乐启宏</title>
    <style>
        body {
            /* 模拟深夜的静谧，带有温度的暗色 */
            background-color: #1a1a1a;
            color: #e6c280; 
            font-family: "STKaiti", "KaiTi", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 3s ease;
        }

        #timer-container {
            text-align: center;
            line-height: 2.5;
            font-size: 1.2rem;
            letter-spacing: 3px;
            opacity: 0.9;
        }

        .highlight {
            font-size: 1.8rem;
            color: #ffda89;
            font-weight: bold;
        }

        /* 互动按钮：迟行 */
        #interact-btn {
            margin-top: 50px;
            padding: 12px 30px;
            background: transparent;
            color: #e6c280;
            border: 1px solid #e6c280;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 1s ease;
        }

        #interact-btn:hover {
            background-color: #e6c280;
            color: #1a1a1a;
        }

        /* 隐藏的诗句彩蛋 */
        #poem-egg {
            margin-top: 40px;
            font-size: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2.5s ease;
        }

        .revealed {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>
<body>

    <div id="timer-container">
        <div id="time-text">正在感知时间的脉搏...</div>
    </div>

    <button id="interact-btn" onclick="lightUpZili()">迟行一步，点亮字里</button>

    <div id="poem-egg">
        岁月不居，时节如流。<br>
        愿这字里行间，皆是温情与自由。
    </div>

    <script>
        // 请在此处替换为你的真实出生时间 (年, 月-1, 日, 时, 分)
        // 注意：JavaScript中月份是从0开始的，所以1月是0，12月是11。
        const birthDate = new Date(1990, 0, 1, 0, 0); 

        function updateTimer() {
            const now = new Date();
            const diffMs = now - birthDate;
            
            const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diffMs / 1000 / 60) % 60);
            
            // 估算呼吸次数 (静息状态约每分钟16次)
            const breaths = Math.floor(diffMs / 1000 / 60 * 16);

            document.getElementById('time-text').innerHTML = `
                在这颗星球上，你已迎来了 <span class="highlight">${days}</span> 次晨曦<br>
                经历了 <span class="highlight">${hours}</span> 小时 <span class="highlight">${minutes}</span> 分钟的流转<br>
                约莫完成了 <span class="highlight">${breaths.toLocaleString()}</span> 次平稳的呼吸
            `;
        }

        // 初始运行并每分钟更新一次
        updateTimer();
        setInterval(updateTimer, 60000); 

        // 互动功能：点亮字里
        function lightUpZili() {
            // 背景变暖
            document.body.style.backgroundColor = "#2a2118";
            
            // 按钮淡出
            const btn = document.getElementById('interact-btn');
            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 1000);

            // 诗句浮现
            setTimeout(() => {
                document.getElementById('poem-egg').classList.add('revealed');
            }, 500);
        }
    </script>
</body>
</html>
