<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字里 · 迟行的生辰</title>
    <style>
        /* ================= 诗笺风格 ================= */
        :root {
            --paper-bg: #fdfbf7; /* 温润的米白/宣纸色 */
            --ink-main: #2c2621; /* 深墨色 */
            --ink-light: #8b7e74; /* 浅墨色，用于辅助提示 */
            --seal-red: #a64036; /* 朱砂红，用于提亮和点缀 */
            --font-main: "STKaiti", "KaiTi", "Times New Roman", serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--paper-bg);
            color: var(--ink-main);
            font-family: var(--font-main);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; touch-action: none;
            background-image: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.02) 100%);
        }

        /* --- 旁白 (字里的声音) --- */
        #narrator-box {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; text-align: center;
            font-size: 1.2rem; line-height: 2.2; letter-spacing: 3px;
            z-index: 10; font-weight: 500; transition: opacity 1.5s ease;
            min-height: 80px;
        }
        .typing-cursor::after { content: '|'; animation: blink 1.2s step-end infinite; color: var(--ink-light); }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- 舞台与场景 --- */
        #stage { 
            position: absolute; top: 30%; left: 0; width: 100%; height: 40%; 
            z-index: 5; display: flex; justify-content: center; align-items: center; 
        }
        .scene {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease;
        }
        .scene.active { opacity: 1; pointer-events: auto; }

        /* --- 底部文本与视觉引导 --- */
        #bottom-area {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; display: flex; flex-direction: column; align-items: center;
            z-index: 10; transition: opacity 1s;
        }
        
        #summary-text {
            font-size: 1.15rem; line-height: 2; text-align: center; 
            opacity: 0; transition: opacity 1s ease; margin-bottom: 30px;
            color: var(--ink-main); min-height: 80px;
        }

        .hint-wrap { opacity: 0; transition: opacity 0.8s; display: flex; flex-direction: column; align-items: center;}
        .hint-wrap.show { opacity: 1; }
        .hint-text {
            font-size: 0.9rem; color: var(--ink-light); letter-spacing: 2px;
            animation: gentleFloat 3s infinite alternate ease-in-out;
        }
        @keyframes gentleFloat { 0% { transform: translateY(0); opacity: 0.6; } 100% { transform: translateY(-5px); opacity: 1; } }
        
        /* 细细的引导线 */
        .hint-line { width: 1px; height: 20px; background-color: var(--ink-light); margin-bottom: 10px; opacity: 0.5; }

        /* ================= 纯粹的线条艺术 (SVG) ================= */
        /* 线条绘制动画 */
        .draw-line {
            fill: none; stroke: var(--ink-main); stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
        }
        .draw-accent { stroke: var(--seal-red); }
        .fill-accent { fill: var(--seal-red); opacity: 0; transition: opacity 2s ease; }

        .scene.active .draw-line { animation: drawPath 2.5s ease-out forwards; }
        .scene.active .fill-accent { opacity: 1; transition-delay: 2s; }

        @keyframes drawPath { to { stroke-dashoffset: 0; } }

        /* 幕 1：烛火 */
        #candle-svg { width: 60px; height: auto; overflow: visible; transition: opacity 2s;}
        .flame-group { transform-origin: 50% 30px; transition: all 1.5s ease; }
        .flame-path { fill: var(--seal-red); animation: flicker 2s infinite alternate; }
        @keyframes flicker { 0% { transform: scale(0.95) skewX(-2deg); } 100% { transform: scale(1.05) skewX(2deg); } }
        
        .smoke-path { fill: none; stroke: var(--ink-light); stroke-width: 1.5; stroke-dasharray: 50; stroke-dashoffset: 50; transition: stroke-dashoffset 2s ease; opacity: 0; }
        .extinguished .flame-group { transform: scale(0) translateY(-20px); opacity: 0; }
        .extinguished .smoke-path { opacity: 0.6; stroke-dashoffset: 0; animation: drift 4s forwards; }
        @keyframes drift { 100% { transform: translateY(-30px) scale(1.2); opacity: 0; } }

        /* 幕 2：线稿蛋糕 */
        #cake-container { position: relative; width: 200px; height: 160px; }
        .cake-half { position: absolute; top:0; width: 100%; height: 100%; transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1), opacity 2s; }
        #cake-left { clip-path: inset(0 50% 0 0); }
        #cake-right { clip-path: inset(0 0 0 50%); }
        .split .cake-half#cake-left { transform: translateX(-80px); opacity: 0; }
        .split .cake-half#cake-right { transform: translateX(80px); opacity: 0; }

        /* 切痕引导 */
        #cut-guide {
            position: absolute; left: 50%; top: -20px; width: 1px; height: 200px;
            background: linear-gradient(to bottom, transparent, var(--seal-red), transparent);
            transform: translateX(-50%); opacity: 0; transition: opacity 0.5s;
        }
        
        /* 中间的切片 */
        #slice-svg { 
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%) scale(0.8); 
            width: 140px; height: auto; opacity: 0; transition: all 2s ease; z-index: 2;
        }
        .split #slice-svg { opacity: 1; transform: translateX(-50%) scale(1); transition-delay: 0.5s;}

        /* 幕 3：优雅的图层褪色 */
        .slice-layer { transition: opacity 1.5s ease, transform 1.5s ease; transform-origin: center; }
        .layer-faded { opacity: 0; transform: translateY(-10px); }

        /* ================= 结语与数据 ================= */
        #stats-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; pointer-events: none; transition: opacity 2s ease;
        }
        .stat-num { font-size: 3.5rem; color: var(--seal-red); font-family: "Times New Roman", serif; font-weight: 300; letter-spacing: 5px; margin: 10px 0;}
        .stat-text { font-size: 1.1rem; color: var(--ink-main); letter-spacing: 4px; }

        #final-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--paper-bg); z-index: 20; opacity: 0; pointer-events: none; transition: opacity 2.5s ease;
        }
        .final-msg { font-size: 1.25rem; line-height: 2.4; text-align: center; margin-bottom: 5vh; color: var(--ink-main); font-weight: 500;}
        .final-date { font-family: "Times New Roman", serif; font-size: 1.2rem; letter-spacing: 6px; color: var(--seal-red); margin-bottom: 6vh; position: relative;}
        .final-date::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 1px; background-color: var(--seal-red); opacity: 0.5;}
        
        .social-row { display: flex; gap: 40px; margin-bottom: 6vh;}
        .social-btn { 
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--ink-light); 
            display: flex; justify-content: center; align-items: center; transition: all 0.4s; color: var(--ink-light); text-decoration: none;
        }
        .social-btn:active { transform: scale(0.9); border-color: var(--ink-main); color: var(--ink-main); }
        .social-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .replay-btn { background: transparent; color: var(--ink-main); border: none; font-family: inherit; font-size: 1rem; cursor: pointer; transition: all 0.3s; letter-spacing: 3px; position: relative; padding: 5px 0;}
        .replay-btn::after { content:''; position: absolute; bottom:0; left:0; width:0; height:1px; background:var(--ink-main); transition: width 0.3s;}
        .replay-btn:active::after { width: 100%; }

    </style>
</head>
<body>

    <!-- 顶部旁白 -->
    <div id="narrator-box"></div>

    <!-- 存活天数浮层 -->
    <div id="stats-layer">
        <div class="stat-text">距离我第一次看见这片天空已经有</div>
        <div class="stat-num" id="days-lived">0</div>
        <div class="stat-text">天</div>
    </div>

    <!-- 主舞台 -->
    <main id="stage">
        
        <!-- 幕 1：孤光 -->
        <div id="scene-1" class="scene active">
            <svg id="candle-svg" viewBox="0 0 100 200">
                <!-- 蜡烛身 -->
                <path class="draw-line" d="M 40 80 L 40 180 Q 50 185 60 180 L 60 80 Q 50 75 40 80 Z" />
                <!-- 烛芯 -->
                <path class="draw-line" d="M 50 80 L 50 65" stroke-width="1.5" />
                <!-- 火焰 -->
                <g class="flame-group" id="flame">
                    <path class="flame-path" d="M 50 30 Q 60 50 50 65 Q 40 50 50 30 Z" />
                </g>
                <!-- 熄灭后的烟 -->
                <path class="smoke-path" d="M 50 60 Q 40 40 55 20 Q 70 0 45 -20" />
            </svg>
        </div>

        <!-- 幕 2：线稿切割 -->
        <div id="scene-2" class="scene">
            <div id="cake-container">
                <div class="cake-half" id="cake-left">
                    <svg viewBox="0 0 200 160">
                        <!-- 顶盘 -->
                        <ellipse class="draw-line" cx="100" cy="40" rx="80" ry="30" />
                        <!-- 侧边 -->
                        <path class="draw-line" d="M 20 40 L 20 110 A 80 30 0 0 0 180 110 L 180 40" />
                        <!-- 装饰：奶油滴落 -->
                        <path class="draw-line" d="M 20 40 Q 30 60 40 40 Q 55 70 70 40 Q 85 55 100 40" />
                        <!-- 装饰：樱桃点缀 -->
                        <circle class="draw-line draw-accent" cx="60" cy="30" r="8" />
                    </svg>
                </div>
                <div class="cake-half" id="cake-right">
                    <svg viewBox="0 0 200 160">
                        <!-- 完全对称的绘制 -->
                        <ellipse class="draw-line" cx="100" cy="40" rx="80" ry="30" />
                        <path class="draw-line" d="M 20 40 L 20 110 A 80 30 0 0 0 180 110 L 180 40" />
                        <path class="draw-line" d="M 100 40 Q 115 65 130 40 Q 145 50 160 40 Q 170 55 180 40" />
                        <circle class="draw-line draw-accent" cx="140" cy="25" r="8" />
                    </svg>
                </div>
                
                <div id="cut-guide"></div>
                
                <!-- 藏在中间的切片 (第三幕的主角) -->
                <svg id="slice-svg" viewBox="0 0 140 140">
                    <!-- 底座海绵 -->
                    <path class="draw-line slice-layer" id="layer-sponge" d="M 10 100 L 70 130 L 130 100 L 70 80 Z M 10 100 L 10 120 L 70 150 L 130 120 L 130 100" />
                    <!-- 夹心 -->
                    <path class="draw-line draw-accent slice-layer" id="layer-jam" d="M 10 85 L 70 115 L 130 85 L 70 65 Z" stroke-dasharray="4 4"/>
                    <!-- 顶部奶油 -->
                    <path class="draw-line slice-layer" id="layer-cream" d="M 10 70 L 70 100 L 130 70 L 70 40 Z" />
                    <!-- 樱桃 -->
                    <g class="slice-layer" id="layer-cherry">
                        <circle class="draw-line draw-accent" cx="70" cy="35" r="10" />
                        <path class="draw-line" d="M 70 25 Q 75 15 85 20" />
                    </g>
                </svg>
            </div>
        </div>

    </main>

    <!-- 底部区域 -->
    <div id="bottom-area">
        <div id="summary-text"></div>
        <div class="hint-wrap" id="hint-box">
            <div class="hint-line"></div>
            <div class="hint-text" id="hint-msg">提示文字</div>
        </div>
    </div>

    <!-- 最终页 -->
    <div id="final-screen">
        <div class="final-msg">
            蛋糕吃完啦。<br><br>
            十八岁，是一个新的标点符号。<br>
            很高兴你能在「字里」，<br>陪迟行见证。
        </div>
        <div class="final-date">2008.03.17</div>
        <div class="social-row">
            <a href="mailto:qihongpoet@gmail.com" class="social-btn"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></a>
            <a href="https://www.instagram.com/galiambuqq?igsh=MWViMzBqYXNvdHI5MQ==" target="_blank" class="social-btn"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>
            <a href="https://www.facebook.com/share/18Ks76ntM8/" target="_blank" class="social-btn"><svg viewBox="0 0 24 24"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg></a>
        </div>
        <button class="replay-btn" onclick="location.reload()">重新翻阅</button>
    </div>

    <script>
        // ================= 基础逻辑与打字机 =================
        const birthDate = new Date(2008, 2, 17); // 2008.03.17
        const diffDays = Math.floor((new Date() - birthDate) / (1000 * 60 * 60 * 24));
        document.getElementById('days-lived').innerText = diffDays;

        const narratorBox = document.getElementById('narrator-box');
        const hintWrap = document.getElementById('hint-box');
        const hintMsg = document.getElementById('hint-msg');
        const summaryBox = document.getElementById('summary-text');
        
        let STAGE = 0; 
        let isProcessing = true; 
        
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function speak(text, delay=1000) {
            narratorBox.style.opacity = 1;
            narratorBox.innerHTML = '';
            let current = "";
            for(let i=0; i<text.length; i++) {
                if(text[i]==='<') {
                    let tag = ""; while(text[i]!=='>') tag += text[i++]; current += tag + '>';
                } else {
                    current += text[i];
                    narratorBox.innerHTML = current + '<span class="typing-cursor"></span>';
                    await sleep(['。','，'].includes(text[i]) ? 300 : 80);
                }
            }
            narratorBox.innerHTML = current;
            await sleep(delay);
        }

        function showHint(txt) { hintMsg.innerText = txt; hintWrap.classList.add('show'); }
        function hideHint() { hintWrap.classList.remove('show'); }

        // ================= 统一手势监听 (极简宽容逻辑) =================
        let startY = 0, startX = 0;
        
        document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startX = e.touches[0].clientX; });
        document.addEventListener('mousedown', e => { startY = e.clientY; startX = e.clientX; });
        
        document.addEventListener('touchend', e => handleGesture(e.changedTouches[0].clientX, e.changedTouches[0].clientY));
        document.addEventListener('mouseup', e => handleGesture(e.clientX, e.clientY));

        function handleGesture(endX, endY) {
            if (isProcessing) return;
            let deltaY = endY - startY;
            let deltaX = endX - startX;
            let distance = Math.hypot(deltaX, deltaY);

            // 区分滑动和点击
            if (distance > 40) {
                // 滑动
                if (STAGE === 1) handleExtinguish();
                if (STAGE === 2 && deltaY > 30) handleCut(); // 必须是向下滑动
            } else if (distance < 10) {
                // 点击
                if (STAGE === 3) handleTaste();
            }
        }

        // ================= 场景过渡逻辑 =================
        
        // --- 序幕 ---
        async function runIntro() {
            await sleep(1000);
            await speak("推开「字里」的门。<br>纸页上，有一位叫迟行的少年。", 1500);
            
            STAGE = 1;
            await speak("今天，他十八岁了。", 500);
            showHint("指尖轻划，拂过微光");
            isProcessing = false;
        }

        // --- 幕 1：熄灭 ---
        async function handleExtinguish() {
            isProcessing = true;
            hideHint();
            
            // 添加熄灭类，CSS动画处理缩放和烟雾
            document.getElementById('candle-svg').classList.add('extinguished');
            
            await sleep(2000);
            narratorBox.style.opacity = 0;
            await sleep(1000);
            
            // 隐藏第一幕，浮现数据
            document.getElementById('scene-1').classList.remove('active');
            
            const stats = document.getElementById('stats-layer');
            stats.style.opacity = 1;
            await sleep(3500); // 留白沉淀
            stats.style.opacity = 0;
            await sleep(1500);

            // 进入第二幕
            STAGE = 2;
            document.getElementById('scene-2').classList.add('active');
            
            await speak("切开的不是蛋糕，<br>是过往的断层。", 500);
            
            document.getElementById('cut-guide').style.opacity = 1;
            showHint("顺着引线，向下滑动");
            isProcessing = false;
        }

        // --- 幕 2：切开 ---
        async function handleCut() {
            isProcessing = true;
            hideHint();
            document.getElementById('cut-guide').style.opacity = 0;
            narratorBox.style.opacity = 0;
            
            // 触发CSS分离开启动画
            document.getElementById('cake-container').classList.add('split');
            
            await sleep(3000);
            
            STAGE = 3;
            await speak("最内核的岁月，<br>他留给了你。", 500);
            showHint("轻触切片，品尝一年的痕迹");
            isProcessing = false;
        }

        // --- 幕 3：分层品尝 ---
        let bites = 0;
        const poetrySummaries = [
            "第一口：有些酸涩。<br>遇到无法轻易定义的情感，学会了静静倾听，而不是一味索求。",
            "第二口：开始回甘。<br>18岁的风有点急，但他试着扎稳脚跟。笔下渐渐有了温度。",
            "第三口：满是醇厚。<br>世界催着人长大，但他心底纯粹热爱诗词的少年，依然还在。",
            "第四口：余味悠长。<br>有过迷茫与酸涩，但这都是岁月赋予他的独特口感。"
        ];
        
        // 对应的SVG图层ID（从上往下消失）
        const layers = ['layer-cherry', 'layer-cream', 'layer-jam', 'layer-sponge'];

        async function handleTaste() {
            isProcessing = true;
            hideHint();
            summaryBox.style.opacity = 0;
            
            // 让对应的SVG线条图层褪色并上浮消失
            if (bites < 4) {
                document.getElementById(layers[bites]).classList.add('layer-faded');
            }

            await sleep(500);
            
            if (bites < 4) {
                summaryBox.innerHTML = poetrySummaries[bites];
                summaryBox.style.opacity = 1;
                bites++;
                
                await sleep(2500); // 强制停留，阅读文字
                
                isProcessing = false;
                if(bites === 4) {
                    showHint("最后一次轻触，合上书页");
                } else {
                    showHint("继续轻触");
                }
            } else {
                // 全部吃完，进入结语
                summaryBox.style.opacity = 0;
                narratorBox.style.opacity = 0;
                await sleep(1500);
                
                document.getElementById('stage').style.display = 'none'; // 彻底清空舞台
                
                const finalScreen = document.getElementById('final-screen');
                finalScreen.style.pointerEvents = 'auto';
                finalScreen.style.opacity = 1;
            }
        }

        // 启动
        runIntro();

    </script>
</body>
</html>
